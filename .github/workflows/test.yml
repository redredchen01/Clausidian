name: Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20'
        run: |
          npm test -- --reporter=tap > coverage.txt
          # Coverage metrics will be added in v2.5.0

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for console errors in tests
        run: |
          npm test 2>&1 | grep -E "(console\.(error|warn)|Error|FAIL)" || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documentation
        run: |
          [ -f README.md ] && echo "✓ README.md exists"
          [ -f ARCHITECTURE.md ] && echo "✓ ARCHITECTURE.md exists"
          [ -f CONTRIBUTING.md ] && echo "✓ CONTRIBUTING.md exists"
          [ -f CHANGELOG.md ] && echo "✓ CHANGELOG.md exists"

  publish:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
